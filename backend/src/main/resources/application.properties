# ========== Server ==========
server.port=${PORT:8080}
server.error.include-message=always
# CORS configuration
application.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001}

# ========== PostgreSQL ==========
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/mockinterview_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=org.postgresql.Driver

# ========== JPA / Hibernate ==========
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ========== JWT ==========
application.security.jwt.secret-key=${JWT_SECRET_KEY:my-secret-key-that-is-at-least-256-bits-long}
application.security.jwt.expiration=${JWT_EXPIRATION:86400000}
application.security.jwt.refresh-token.expiration=${JWT_REFRESH_EXPIRATION:604800000}

# ========== File Upload ==========
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload-dir=./uploads

# ========== Gemini API & Groq API ==========
gemini.api.key=${GEMINI_API_KEY:}
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent
groq.api.key=${GROQ_API_KEY:}

# ========== Logging ==========
logging.level.com.mockinterview=${LOG_LEVEL:DEBUG}
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

# ========== Mail Server (SMTP) ==========
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SMTP_USERNAME:user@gmail.com}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
